# Render.com free-tier web service config. Deploy: connect this repo, set the
# root directory to `server`, and Render will pick this up automatically.
# (Railway/Fly.io work too — see docs/SETUP.md for those instead.)
services:
  - type: web
    name: current-relay
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Optional. Defaults to on. Set to "false" to stop writing to
      # message_transfer_log without a code change or redeploy.
      - key: ENABLE_TRANSFER_LOG
        value: "true"
      # Optional — TURN relay fallback for calling on strict NATs. See
      # docs/SETUP.md section 3.5. Calling works STUN-only (no TURN) if
      # these are left unset; only strict-NAT connections need TURN.
      - key: TURN_URLS
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
